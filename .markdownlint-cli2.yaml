# markdownlint-cli2 config for lobes.
# markdownlint-cli2 stops walking at the git root, so a per-user global config
# in the home directory isn't picked up from inside the repo.
# Mirrors the steward / afi-cli preset for workspace consistency.

config:
  default: true
  # MD013: Line length — disabled. Prose lines wrap at the reader.
  MD013: false
  # MD060: Table pipe spacing — disabled (stylistic preference).
  MD060: false
  # MD024: Duplicate headings — allow under different parents so Keep a
  # Changelog entries can each have ### Added / ### Changed / ### Fixed.
  MD024:
    siblings_only: true

ignores:
  - "node_modules/**"
  - ".local/**"
  # Internal planning artifacts (design specs, implementation plans) embed nested
  # fenced code blocks that trigger markdownlint violations not worth reformatting.
  - "docs/superpowers/**"
  # devague-generated artifacts: the H1 is the verbatim announcement sentence
  # (ends in a period → MD026) and the body mirrors confirmed claims as-is.
  # Generated, not hand-authored — like docs/superpowers above.
  - "docs/specs/**"
  - "docs/plans/**"
  # Skill prompt templates are model-facing content fed verbatim to a backend
  # (first line is `$ARGUMENTS` or a prose instruction), not human-rendered docs.
  # MD041 (first-line H1) is actively wrong here — a heading would be injected
  # into the prompt. SKILL.md itself is still linted; only `prompts/` is exempt.
  - ".claude/skills/**/prompts/**"
