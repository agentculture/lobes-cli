# SonarCloud project identity. Matches the project key registered on
# SonarCloud and used by the cicd skill's Sonar status queries
# (`agentculture_model-gear`).
sonar.projectKey=agentculture_model-gear
sonar.organization=agentculture

# Source layout — package lives at the top level (no src/ wrapper).
sonar.sources=lobes
sonar.tests=tests

# Coverage report produced in CI by `uv run pytest --cov-report=xml:coverage.xml`
# (see .github/workflows/tests.yml). Path is relative to the repo root.
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Don't analyze noise. `lobes/templates/**` holds deployment *scaffolds*
# (Dockerfiles + docker-compose overlays + a vendored Parakeet ASR server) that
# `model init` materialises into a deployment dir — they are data files shipped
# in the wheel, never imported by the `model` CLI / gateway runtime. Linting them
# as first-class package code flags container-correct patterns (bind-all on a
# private compose network, root-user base image, unpinned pip inside the build)
# that don't fit this project's quality gate; they're validated by `docker build`
# + the live smoke tests in docs/realtime-pipeline.md, not the unit suite.
sonar.exclusions=**/__pycache__/**,**/.venv/**,uv.lock,lobes/templates/**

# Reviewed-safe suppression. `pythonsecurity:S6350` flags the `subprocess.Popen`
# in lobes/runtime/_tunnel.py:start_tunnel that launches the cloudflared
# tunnel. It is safe by construction: the call uses a fixed argv list (never a
# string, `shell=False`), the executables are constants (`cloudflared` / `shushu`),
# the run-token is passed via the child environment (TUNNEL_TOKEN) and never
# appears on argv, and the only externally-sourced argv value (the shushu secret
# *name*) is validated against a strict allowlist (`_SAFE_VALUE`) that rejects
# leading dashes and shell metacharacters before it is used — so argument/command
# injection is not reachable. Scoped to this one rule + file.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=pythonsecurity:S6350
sonar.issue.ignore.multicriteria.e1.resourceKey=lobes/runtime/_tunnel.py

# Reviewed-safe suppression. `python:S2245` flags the seeded `random.Random`
# draws in lobes/bench/cat_probe.py (rng.sample / rng.choice / rng.shuffle) that
# generate the deterministic 'Where is the cat?' benchmark narrative. The
# pseudorandom generator is NOT used for any security / cryptographic purpose: it
# turns an explicit integer seed into reproducible test data — determinism is the
# whole point (`generate_case(seed=N)` must be byte-identical across runs) — and
# it touches no secret, token, password, or security decision, nor does its
# output cross a trust boundary. A CSPRNG (`secrets` / `os.urandom`) would be
# wrong here because it is not seedable. The same calls are already cleared in
# bandit via `# nosec B311`. Scoped to this one rule + file.
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S2245
sonar.issue.ignore.multicriteria.e2.resourceKey=lobes/bench/cat_probe.py

# Coverage exclusions mirror `[tool.coverage.run] omit` in pyproject.toml: the
# realtime FastAPI app + the httpx TTS client + the package entrypoints need the
# [realtime] extra (fastapi/httpx/torch) that the offline CI env never installs,
# so they cannot be unit-imported and are integration-tested live instead. Sonar
# otherwise scores their un-instrumented lines as 0% new-code coverage. The
# stdlib-only realtime helpers (_settings, protocol, audio_facade) stay measured.
sonar.coverage.exclusions=lobes/realtime/app.py,lobes/realtime/__main__.py,lobes/realtime/tts_client.py,lobes/realtime/chatterbox_server.py,lobes/templates/**
