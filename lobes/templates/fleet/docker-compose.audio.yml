# lobes FLEET — audio overlay (STT + TTS + the realtime bridge).
#
# A docker-compose *override*: layer it on top of the base fleet with
#   docker compose -f docker-compose.yml -f docker-compose.audio.yml up -d --build
# `lobes init --fleet --audio` scaffolds it; `lobes fleet up --apply` auto-includes
# it when this file is present. It adds three internal services and teaches the
# gateway to route /v1/audio/* (and, in a later release, /v1/realtime) to them.
#
# TTS: Chatterbox (Resemble AI) sidecar — open-weights, arm64 GPU, no NGC key.
# STT: Parakeet (NeMo ASR) — unchanged.
# The realtime bridge's LLM is the fleet *gateway* (no extra vLLM container).
# All three expose internal ports only; the gateway fronts them on VLLM_PORT.
#
# CO-RESIDENCE: these share the GPU with the two LLM backends. The base fleet
# already warns two ~30B NVFP4 models barely co-fit a GB10 — adding audio
# realistically wants a dedicated box or a single LLM. See docs/realtime-pipeline.md.
services:
  # --- Chatterbox TTS (Resemble AI, open-weights, /v1/audio/synthesize) ------
  chatterbox:
    build:
      context: .
      dockerfile: Dockerfile.chatterbox
      args:
        MODEL_GEAR_VERSION: ${MODEL_GEAR_VERSION:-}
        # Dev lane only (see Dockerfile.chatterbox): empty on release deployments.
        LOBES_DEV_INDEX_URL: ${GATEWAY_PIP_EXTRA_INDEX_URL:-}
    container_name: model-gear-chatterbox
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - CHATTERBOX_HOST=0.0.0.0
      - CHATTERBOX_PORT=${CHATTERBOX_PORT:-9000}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DISABLE_REQUIRE=1
    volumes:
      - ${HF_CACHE:-${HOME:-/root}/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host
    # Internal only — reachable as http://chatterbox:9000 on the compose network.
    expose:
      - "${CHATTERBOX_PORT:-9000}"
    healthcheck:
      # The nvidia/cuda base ships no curl AND installs python as `python3.12`
      # (no `python3` symlink) — probe /ready with that interpreter via stdlib
      # urllib. Using `python3` here makes the healthcheck exec-fail forever, so
      # Docker pins the (working) container at "starting"/"unhealthy".
      test:
        - CMD
        - python3.12
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:${CHATTERBOX_PORT:-9000}/v1/health/ready', timeout=5)"
      interval: 30s
      timeout: 15s
      retries: 5
      # Cold model load on first request: ~19 s; generous start_period covers
      # both container startup and the initial weight-load on first /ready probe.
      start_period: 120s

  # --- Parakeet STT (NeMo ASR, already OpenAI /v1/audio/transcriptions) ------
  stt:
    build:
      context: .
      dockerfile: Dockerfile.parakeet
    container_name: model-gear-stt
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - PARAKEET_PORT=${PARAKEET_PORT:-9002}
      - PARAKEET_MODEL=${PARAKEET_MODEL:-nvidia/parakeet-tdt-0.6b-v2}
      - HF_HOME=/root/.cache/huggingface
      - NVIDIA_DISABLE_REQUIRE=1
    volumes:
      - ${HF_CACHE:-${HOME:-/root}/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host
    expose:
      - "${PARAKEET_PORT:-9002}"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:${PARAKEET_PORT:-9002}/v1/health/ready')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s

  # --- realtime bridge (lobes.realtime, shipped in the wheel) -----------
  # Serves the OpenAI /v1/audio/* facade now (+ /v1/realtime WS in a later
  # release). Its LLM is the gateway — reuses the warm fleet, no extra vLLM.
  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
      args:
        MODEL_GEAR_VERSION: ${MODEL_GEAR_VERSION:-}
        # Dev lane only (see Dockerfile.realtime): empty on release deployments.
        LOBES_DEV_INDEX_URL: ${GATEWAY_PIP_EXTRA_INDEX_URL:-}
    container_name: model-gear-realtime
    restart: unless-stopped
    # Start order only — the facade tolerates a backend still loading (it returns
    # 502 per request), so it must not block on backend health.
    depends_on:
      - gateway
      - stt
      - chatterbox
    environment:
      - REALTIME_HOST=0.0.0.0
      - REALTIME_PORT=${REALTIME_PORT:-8080}
      - STT_URL=http://stt:${PARAKEET_PORT:-9002}
      - TTS_URL=http://chatterbox:${CHATTERBOX_PORT:-9000}
      - OPENAI_BASE_URL=http://gateway:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-EMPTY}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - DEFAULT_VOICE=${DEFAULT_VOICE:-}
      - TTS_SPEED=${TTS_SPEED:-125}
    expose:
      - "${REALTIME_PORT:-8080}"
    healthcheck:
      # python:3.12-slim has no curl — probe /health with stdlib urllib.
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health',timeout=3).status==200 else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- gateway override: teach the front to route /v1/audio/* to realtime ----
  # Merged onto the base fleet's gateway service (compose appends environment).
  gateway:
    environment:
      - AUDIO_URL=${AUDIO_URL:-http://realtime:8080}
