# Local vLLM server — the deployment template model-gear scaffolds.
#
# `model init` copies this file (and env.example -> .env) into a deployment
# directory (default ~/.model-gear). `model serve` / `model switch` then drive
# `docker compose` in that directory.
#
# Serves an OpenAI-compatible API on :8000 that the Culture `acp` backend
# (opencode's `vllm-local` provider) connects to — this is the model the
# model-gear agent consumes. The served model name must match the part after
# `vllm-local/` in the culture.yaml `model:` field.
#
# Quickstart:
#   model init --apply            # scaffold ~/.model-gear (compose + .env)
#   docker login nvcr.io          # NGC API key; see README "Running the model"
#   model serve --apply           # first run downloads ~18 GB of weights
#   model status                  # container state + /health
#
# Tuned for DGX Spark (GB10 Grace Blackwell, SM12.1, 128 GB unified memory).
services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.04-py3   # NGC ARM64/Blackwell build (see README to verify the current tag)
    container_name: model-gear-vllm
    restart: unless-stopped
    # GPU access — requires the NVIDIA Container Toolkit on the host.
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host                              # vLLM needs host shared memory
    ulimits:
      memlock: { soft: -1, hard: -1 }
      stack: { soft: 67108864, hard: 67108864 }
    env_file:
      # Optional — only HF_TOKEN (for gated repos) really needs it. required:false
      # keeps `docker compose up` working before `model init` writes a .env.
      - path: .env
        required: false
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TOKENIZERS_PARALLELISM=false
    volumes:
      # Persist downloaded weights across restarts. HF_CACHE overrides the host
      # path; otherwise ~/.cache/huggingface, with /root as the fallback if HOME
      # is unset (so the mount never collapses to /.cache/huggingface).
      - ${HF_CACHE:-${HOME:-/root}/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "${VLLM_PORT:-8000}:8000"
    command:
      - vllm
      - serve
      - ${VLLM_MODEL:-nvidia/Qwen3-32B-NVFP4}
      - --served-model-name=${VLLM_SERVED_NAME:-nvidia/Qwen3-32B-NVFP4}
      - --host=0.0.0.0
      - --port=8000
      - --quantization=modelopt_fp4        # nvidia/ checkpoint is ModelOpt FP4 (see README for the RedHatAI fallback)
      - --kv-cache-dtype=fp8
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-32768}
      - --gpu-memory-utilization=${VLLM_GPU_MEM_UTIL:-0.6}
      - --reasoning-parser=qwen3           # expose the <think> trace (field is `reasoning` on the nv26.04 build, `reasoning_content` on older vLLM; drop the flag on builds without the parser)
      - --enable-auto-tool-choice          # OpenAI tool/function calling (tool_choice:"auto"); additive — plain chat/reasoning unaffected
      - --tool-call-parser=${VLLM_TOOL_CALL_PARSER:-hermes}   # `hermes` fits Qwen3 dense (e.g. Qwen3-32B); Qwen3-Coder/Qwen3.6 emit XML and need `qwen3_coder` (set VLLM_TOOL_CALL_PARSER); coexists with --reasoning-parser on nv26.04
      - --enable-prefix-caching
      # NOTE: --trust-remote-code is intentionally omitted. Qwen3-32B-NVFP4 loads
      # without it; add it back only for a model whose repo ships custom modeling
      # code (it lets that code run in-container alongside HF_TOKEN + the cache mount).
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s                   # allow time for the first-run weight download + load
