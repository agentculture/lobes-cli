# model-gear FLEET — two always-warm vLLM backends behind one stdlib gateway.
#
# `model init --fleet` copies this file (+ env.example -> .env, + Dockerfile.gateway)
# into a deployment directory; `model fleet up --apply` drives `docker compose
# up -d --build` there. The gateway serves an OpenAI-compatible API on the host
# port the acp `vllm-local` provider expects; it routes by the request's `model`
# field, defaults unknown/missing names to GATEWAY_DEFAULT_MODEL, and fails over
# to the other backend when the chosen one is down.
#
#   model init --fleet --apply     # scaffold (writes the running version into .env)
#   docker login nvcr.io           # NGC API key for the vLLM image
#   model fleet up --apply         # build the gateway + start all three
#   model fleet status             # container states + gateway /health + /v1/models
#
# Tuned for DGX Spark (GB10 Grace Blackwell, 128 GB unified memory). Both models
# stay loaded — keep PRIMARY_GPU_MEM_UTIL + FALLBACK_GPU_MEM_UTIL well under 1.0.
services:
  vllm-primary:
    image: nvcr.io/nvidia/vllm:26.04-py3   # NGC ARM64/Blackwell build (see README to verify the tag)
    container_name: model-gear-vllm-primary
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host
    ulimits:
      memlock: { soft: -1, hard: -1 }
      stack: { soft: 67108864, hard: 67108864 }
    env_file:
      - path: .env
        required: false
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ${HF_CACHE:-${HOME:-/root}/.cache/huggingface}:/root/.cache/huggingface
    # No host port — reachable only as http://vllm-primary:8000 on the compose net.
    expose:
      - "8000"
    command:
      - vllm
      - serve
      - ${PRIMARY_MODEL:-sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP}
      - --served-model-name=${PRIMARY_SERVED_NAME:-sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP}
      - --host=0.0.0.0
      - --port=8000
      - --quantization=${PRIMARY_QUANTIZATION:-modelopt}
      - --kv-cache-dtype=fp8
      - --max-model-len=${PRIMARY_MAX_MODEL_LEN:-32768}
      - --gpu-memory-utilization=${PRIMARY_GPU_MEM_UTIL:-0.40}
      - --max-num-seqs=${PRIMARY_MAX_NUM_SEQS:-2}   # MTP cap — 4 OOMs at n=3/high context
      - --reasoning-parser=qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser=${PRIMARY_TOOL_CALL_PARSER:-qwen3_coder}
      # Mamba prefix caching is experimental for this hybrid 27B; functional, watch for drift.
      - --enable-prefix-caching
      # MTP default primary: speculative decoding (~2.4x decode) + the text-only /
      # custom-code / tokenizer-override flags it needs. To run a non-MTP model as
      # primary, remove these 4 lines (and clear PRIMARY_MAX_NUM_SEQS). See
      # docs/qwen3.6-27b-text-nvfp4-mtp.md.
      # SECURITY: --trust-remote-code runs the model repo's code in-container. HF_TOKEN
      # is only needed to download gated repos (these defaults are public) — leave it
      # empty or use a minimal-scope read-only token; pin revisions you trust.
      - '--speculative-config={"method": "qwen3_5_mtp", "num_speculative_tokens": 3}'
      - --trust-remote-code
      - --language-model-only
      - --tokenizer=mmangkad/Qwen3.6-27B-NVFP4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  vllm-fallback:
    image: nvcr.io/nvidia/vllm:26.04-py3
    container_name: model-gear-vllm-fallback
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    ipc: host
    ulimits:
      memlock: { soft: -1, hard: -1 }
      stack: { soft: 67108864, hard: 67108864 }
    env_file:
      - path: .env
        required: false
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ${HF_CACHE:-${HOME:-/root}/.cache/huggingface}:/root/.cache/huggingface
    expose:
      - "8000"
    command:
      - vllm
      - serve
      # Default fallback is the dense Mistral-Small-3.2-24B (NVFP4): it loads
      # reliably on the GB10, unlike the Qwen3.6-35B-A3B MoE it replaced (which
      # OOM'd/stalled here — see docs/qwen3.6-35b-a3b-nvfp4.md).
      - ${FALLBACK_MODEL:-RedHatAI/Mistral-Small-3.2-24B-Instruct-2506-NVFP4}
      - --served-model-name=${FALLBACK_SERVED_NAME:-RedHatAI/Mistral-Small-3.2-24B-Instruct-2506-NVFP4}
      - --host=0.0.0.0
      - --port=8000
      # Mistral NVFP4 is compressed-tensors (vLLM auto-detects, but pass it
      # explicitly so a switch back to a modelopt_fp4 checkpoint is one env var).
      - --quantization=${FALLBACK_QUANTIZATION:-compressed-tensors}
      - --kv-cache-dtype=fp8
      - --max-model-len=${FALLBACK_MAX_MODEL_LEN:-32768}
      - --gpu-memory-utilization=${FALLBACK_GPU_MEM_UTIL:-0.35}
      # Mistral-Small-3.2 is multimodal (Mistral3/Pixtral). On the nv26.04 build the
      # mistral tokenizer is REQUIRED for tool-call parsing, but it crashes the
      # Pixtral dummy-input profiler unless images are limited to 0 — so: mistral
      # tokenizer + no image inputs (text + tools only; vision is unused by the
      # fallback). With the HF tokenizer the model's [TOOL_CALLS] markup leaks into
      # content unparsed. No --reasoning-parser: Mistral is an instruct model.
      # Tuned for the Mistral default. tokenizer-mode is env-overridable
      # (FALLBACK_TOKENIZER_MODE=auto for a non-Mistral fallback). --limit-mm-per-prompt
      # stays fixed: compose can't conditionally omit a flag, and the flag is invalid
      # for a text-only fallback — swapping to a different model *family* is a compose
      # edit. See docs/mistral-small-3.2-24b-nvfp4.md.
      - --tokenizer-mode=${FALLBACK_TOKENIZER_MODE:-mistral}
      - --limit-mm-per-prompt={"image":0}
      - --enable-auto-tool-choice
      - --tool-call-parser=${FALLBACK_TOOL_CALL_PARSER:-mistral}
      - --enable-prefix-caching
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
      args:
        MODEL_GEAR_VERSION: ${MODEL_GEAR_VERSION:-}
    container_name: model-gear-gateway
    restart: unless-stopped
    # Start order only — the gateway tolerates a backend still loading (it routes
    # and fails over per request), so it must not block on backend health.
    depends_on:
      - vllm-primary
      - vllm-fallback
    environment:
      - GATEWAY_PORT=8000
      - PRIMARY_URL=http://vllm-primary:8000
      - PRIMARY_SERVED_NAME=${PRIMARY_SERVED_NAME:-sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP}
      - FALLBACK_URL=http://vllm-fallback:8000
      - FALLBACK_SERVED_NAME=${FALLBACK_SERVED_NAME:-RedHatAI/Mistral-Small-3.2-24B-Instruct-2506-NVFP4}
      - GATEWAY_DEFAULT_MODEL=${GATEWAY_DEFAULT_MODEL:-sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP}
      - GATEWAY_ALIASES=${GATEWAY_ALIASES:-}
      - GATEWAY_CONNECT_TIMEOUT=${GATEWAY_CONNECT_TIMEOUT:-5}
      - GATEWAY_READ_TIMEOUT=${GATEWAY_READ_TIMEOUT:-600}
    ports:
      - "${VLLM_PORT:-8000}:8000"
    healthcheck:
      # python:3.12-slim has no curl — probe /health with stdlib urllib instead.
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
